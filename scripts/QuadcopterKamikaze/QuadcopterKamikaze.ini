[Keys]
; Key to open/close the Kamikaze menu
MenuKey=F11
; Key to manually trigger explosion
ExplodeKey=J

[Controller]
; Controller button ID for manual detonation (-1 to disable)
; 47 = G/DPad-Down, 45 = B/Circle, 44 = RB
; See GTA Control IDs: https://docs.fivem.net/docs/game-references/controls/
ExplodeButton=47

[Bomb]
; Velocity delta (m/s) that triggers detonation on impact (1-20)
ImpactForceThreshold=10
; Explosion damage multiplier (1-20)
ExplosionDamageScale=5
; Seconds to show the explosion cutscene camera (1-15)
CutsceneDuration=5
; Extra downward force multiplier simulating bomb weight (1-20)
BombMassFactor=8

[Camera]
; Distance of the cutscene camera from the explosion point in meters (1-30)
CameraDistance=15
